<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍄 KINOKO 本地化语料库</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f7f9fc; color: #333; }
        h1 { text-align: center; color: #d63384; }
        .search-container { text-align: center; margin-bottom: 30px; }
        #searchInput { width: 80%; padding: 15px; font-size: 18px; border: 2px solid #e1e4e8; border-radius: 8px; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #searchInput:focus { border-color: #d63384; }
        #status { text-align: center; color: #666; margin-bottom: 20px; }
        
        .result-item { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #d63384; }
        .source-tag { font-size: 13px; color: #fff; background: #6c757d; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
        
        /* 上下文样式 */
        .context { font-size: 14px; color: #888; padding-left: 15px; border-left: 3px solid #e9ecef; margin: 8px 0; line-height: 1.5; }
        /* 命中句子的样式 */
        .matched-line { font-size: 17px; color: #111; font-weight: 500; margin: 12px 0; line-height: 1.6; }
        /* 高亮关键词 */
        .highlight { background-color: #ffeeba; color: #d63384; font-weight: bold; padding: 0 4px; border-radius: 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>🍄 KINOKO 本地化在线检索系统</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="输入日语或中文关键词开始搜索 (如：お嬢様)...">
    </div>
    
    <div id="status">正在读取语料库，请稍候...</div>
    <div id="results"></div>

    <script>
        let corpusData = [];

        // 读取打包好的语料数据
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                corpusData = data;
                document.getElementById('status').innerText = `加载成功！当前语料库共包含 ${data.length} 条数据。`;
            })
            .catch(err => {
                document.getElementById('status').innerText = '加载数据失败，请确保已经生成了 data.json 文件并且成功上传！';
            });

        // 避免输入特殊符号导致正则崩溃的保护函数
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 实时搜索功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.trim();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (keyword === '') {
                document.getElementById('status').innerText = `当前语料库共包含 ${corpusData.length} 条数据。`;
                return;
            }

            const lowerKeyword = keyword.toLowerCase();
            const matchedIndices = [];

            // 找出所有命中的行号 (最多100个)
            for (let i = 0; i < corpusData.length; i++) {
                if (corpusData[i].text.toLowerCase().includes(lowerKeyword)) {
                    matchedIndices.push(i);
                    if (matchedIndices.length >= 100) break; 
                }
            }

            if (matchedIndices.length === 0) {
                document.getElementById('status').innerText = '没有找到相关结果 😭';
                return;
            }

            document.getElementById('status').innerText = `为您找到相关结果 ${matchedIndices.length} 条 (最多展示100条)：`;

            const safeKeyword = escapeRegExp(keyword);
            const regex = new RegExp(`(${safeKeyword})`, 'gi');

            matchedIndices.forEach(index => {
                const item = corpusData[index];
                const highlightedText = item.text.replace(regex, '<span class="highlight">$1</span>');

                // 智能获取上下文：只有当上一句/下一句属于同一本书/同一个文件时，才显示
                       let corpusData = [];

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                corpusData = data;
                document.getElementById('status').innerText = `加载成功！当前语料库共包含 ${data.length} 条数据。`;
            })
            .catch(err => {
                document.getElementById('status').innerText = '加载数据失败，请确保已经生成了 data.json 文件并且成功上传！';
            });

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.trim();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (keyword === '') {
                document.getElementById('status').innerText = `当前语料库共包含 ${corpusData.length} 条数据。`;
                return;
            }

            const lowerKeyword = keyword.toLowerCase();
            const matchedIndices = [];

            for (let i = 0; i < corpusData.length; i++) {
                if (corpusData[i].text.toLowerCase().includes(lowerKeyword)) {
                    matchedIndices.push(i);
                    if (matchedIndices.length >= 100) break; 
                }
            }

            if (matchedIndices.length === 0) {
                document.getElementById('status').innerText = '没有找到相关结果 😭';
                return;
            }

            document.getElementById('status').innerText = `为您找到相关结果 ${matchedIndices.length} 条 (最多展示100条)：`;

            const safeKeyword = escapeRegExp(keyword);
            const regex = new RegExp(`(${safeKeyword})`, 'gi');

            matchedIndices.forEach(index => {
                const item = corpusData[index];
                // 高亮核心文本
                const highlightedText = item.text.replace(regex, '<span class="highlight">$1</span>');

                // 只提取相邻句子的纯文本（不再显示冗余的网址等）
                let prevContext = '';
                if (index > 0 && corpusData[index-1].source === item.source) {
                    prevContext = `<div class="context">⬆️ ${corpusData[index-1].text}</div>`;
                }

                let nextContext = '';
                if (index < corpusData.length - 1 && corpusData[index+1].source === item.source) {
                    nextContext = `<div class="context">⬇️ ${corpusData[index+1].text}</div>`;
                }

                // 如果有额外信息（章节、说话人），以浅色小字显示在来源旁边
                const metaTag = item.meta ? `<span style="font-size: 12px; color: #666; margin-left: 10px;">🏷️ ${item.meta}</span>` : '';

                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
                    <div style="margin-bottom: 12px;">
                        <span class="source-tag">📂 ${item.source}</span>${metaTag}
                    </div>
                    ${prevContext}
                    <div class="matched-line">🎯 ${highlightedText}</div>
                    ${nextContext}
                `;
                resultsDiv.appendChild(div);
            });
        });
            });
        });
    </script>
</body>
</html>
