<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍄 KINOKO 本地化语料库</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 960px; margin: 0 auto; padding: 20px; background-color: #f7f9fc; color: #333; }
        h1 { text-align: center; color: #d63384; margin-bottom: 20px; }

        /* ── 顶部 Tab 切换 ── */
        .tab-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 16px; }
        .tab-btn { padding: 10px 25px; font-size: 16px; font-weight: bold; border: 2px solid #d63384; border-radius: 30px; background: transparent; color: #d63384; cursor: pointer; transition: all 0.3s; outline: none; }
        .tab-btn.active { background: #d63384; color: white; box-shadow: 0 4px 8px rgba(214,51,132,0.3); }
        .tab-btn:hover { transform: translateY(-2px); }

        /* ── 游戏分类筛选栏（技能库专属）── */
        #gameFilter { display: none; justify-content: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .gf-btn { padding: 5px 18px; font-size: 14px; border: 1.5px solid #0d6efd; border-radius: 20px; background: transparent; color: #0d6efd; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .gf-btn.active { background: #0d6efd; color: white; box-shadow: 0 2px 6px rgba(13,110,253,0.3); }
        .gf-btn:hover { transform: translateY(-1px); }
        .gf-count { font-size: 12px; opacity: 0.75; }

        /* ── 搜索框 ── */
        .search-container { text-align: center; margin-bottom: 24px; }
        #searchInput { width: 80%; padding: 15px; font-size: 18px; border: 2px solid #e1e4e8; border-radius: 8px; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: border 0.3s; }
        #searchInput:focus { border-color: #d63384; }
        #status { text-align: center; color: #666; margin-bottom: 20px; font-weight: 500; }

        /* ── 剧情卡片 ── */
        .result-item { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #d63384; }
        .source-tag { font-size: 13px; color: #fff; background: #6c757d; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        .meta-tag { font-size: 12px; color: #666; margin-left: 10px; display: inline-block; }
        .matched-line { font-size: 17px; color: #111; font-weight: bold; margin: 15px 0; line-height: 1.6; padding-left: 10px; border-left: 3px solid #d63384; }
        .highlight { background-color: #ffeeba; color: #d63384; padding: 0 3px; border-radius: 3px; }
        .context-details { background: #f8f9fa; border-radius: 6px; padding: 5px 15px; margin: 5px 0; border: 1px solid #e9ecef; }
        .context-details summary { cursor: pointer; color: #6c757d; font-size: 13px; font-weight: bold; outline: none; padding: 5px 0; user-select: none; transition: color 0.2s; }
        .context-details summary:hover { color: #d63384; }
        .context-box { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #dee2e6; max-height: 300px; overflow-y: auto; }
        .context-line { margin-bottom: 8px; font-size: 14px; color: #555; line-height: 1.6; }

        /* ── 技能卡片 ── */
        .skill-card { border-left-color: #0d6efd; padding: 16px 20px; }
        .skill-header { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .skill-name { font-size: 18px; font-weight: bold; color: #111; }
        .game-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .game-badge.feh  { background: #e8f0fe; color: #1a56db; }
        .game-badge.pka  { background: #fce8f7; color: #9c27b0; }
        .skill-type-badge { display: inline-block; padding: 2px 9px; background: #e9ecef; color: #495057; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .sp-badge { display: inline-block; padding: 2px 9px; background: #fff3cd; color: #856404; border-radius: 4px; font-size: 12px; font-weight: bold; }

        /* 多等级效果表格 */
        .skill-levels { border: 1px solid #e0e7ef; border-radius: 6px; overflow: hidden; margin-top: 4px; }
        .skill-level-row { display: grid; grid-template-columns: 3.2rem 1fr; border-bottom: 1px solid #f0f4f8; }
        .skill-level-row:last-child { border-bottom: none; }
        .skill-lv-label { background: #edf2fb; color: #1a56db; font-weight: bold; font-size: 12px; display: flex; align-items: flex-start; justify-content: center; padding: 9px 4px; }
        .skill-lv-effect { padding: 8px 12px; font-size: 14px; line-height: 1.65; color: #222; }
        .effect-note { color: #888; font-size: 13px; }

        /* 单行效果 / 链接技能 */
        .skill-effect-row { padding: 6px 0; font-size: 15px; line-height: 1.65; color: #222; }
        .skill-info-row { display: flex; align-items: baseline; gap: 8px; margin-top: 6px; font-size: 14px; color: #555; }
        .skill-info-label { background: #e9ecef; padding: 1px 8px; border-radius: 3px; font-size: 12px; color: #495057; white-space: nowrap; }

        /* 标签行 */
        .skill-tags { margin-top: 8px; font-size: 13px; color: #6c757d; }
        .skill-tag-chip { display: inline-block; background: #f0f0f0; color: #555; padding: 1px 7px; border-radius: 10px; font-size: 12px; margin: 2px 3px 2px 0; }
    </style>
</head>
<body>
    <h1>🍄 KINOKO 本地化在线检索系统</h1>

    <div class="tab-container">
        <button class="tab-btn active" data-mode="dialogue">💬 剧情台词库</button>
        <button class="tab-btn" data-mode="skill">⚔️ 游戏技能库</button>
    </div>

    <!-- 游戏分类筛选（仅技能库显示） -->
    <div id="gameFilter">
        <button class="gf-btn active" data-game="all">全部游戏 <span class="gf-count" id="cnt-all"></span></button>
        <button class="gf-btn" data-game="feh">⚔️ FEH <span class="gf-count" id="cnt-feh"></span></button>
        <button class="gf-btn" data-game="pka">👻 ファンキルオルタナ <span class="gf-count" id="cnt-pka"></span></button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="输入日语或中文关键词开始搜索 (如：お嬢様)...">
    </div>

    <div id="status">正在读取语料库，请稍候...</div>
    <div id="results"></div>

    <script>
    let corpusData = [];
    let currentMode = 'dialogue';
    let currentGame = 'all';

    fetch('data.json')
        .then(r => r.json())
        .then(data => {
            corpusData = data;
            updateCounts();
            updateStatus();
        })
        .catch(() => {
            document.getElementById('status').innerText = '加载数据失败，请确保已生成 data.json 并成功上传！';
        });

    /* ── 游戏来源识别 ── */
    function getGame(source) {
        if (source.includes('feh_skills')) return 'feh';
        if (source.includes('pk_alterna')) return 'pka';
        return 'other';
    }

    function isSkillItem(item) {
        return item.type === 'skill_desc';
    }

    /* ── 动态更新筛选按钮计数 ── */
    function updateCounts() {
        const skills = corpusData.filter(isSkillItem);
        const feh  = skills.filter(d => getGame(d.source) === 'feh').length;
        const pka  = skills.filter(d => getGame(d.source) === 'pka').length;
        document.getElementById('cnt-all').textContent = `(${skills.length})`;
        document.getElementById('cnt-feh').textContent = `(${feh})`;
        document.getElementById('cnt-pka').textContent = `(${pka})`;
    }

    function updateStatus() {
        let items = corpusData.filter(d => currentMode === 'skill' ? isSkillItem(d) : !isSkillItem(d));
        if (currentMode === 'skill' && currentGame !== 'all') {
            items = items.filter(d => getGame(d.source) === currentGame);
        }
        document.getElementById('status').innerText =
            `当前【${currentMode === 'skill' ? '技能库' : '剧情库'}】共包含 ${items.length} 条数据。`;
    }

    /* ── Tab 切换 ── */
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            currentMode = e.currentTarget.dataset.mode;
            const isSkill = currentMode === 'skill';
            document.getElementById('gameFilter').style.display = isSkill ? 'flex' : 'none';
            document.getElementById('searchInput').placeholder = isSkill
                ? '输入技能名称、属性或效果关键词 (如：攻撃、奥義)...'
                : '输入日语或中文关键词开始搜索 (如：お嬢様)...';
            updateStatus();
            performSearch();
        });
    });

    /* ── 游戏筛选切换 ── */
    document.querySelectorAll('.gf-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            document.querySelectorAll('.gf-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            currentGame = e.currentTarget.dataset.game;
            updateStatus();
            performSearch();
        });
    });

    /* ── 工具函数 ── */
    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function hl(str, regex) {
        if (!str || !regex) return str || '';
        return str.replace(regex, '<span class="highlight">$1</span>');
    }

    /* 将 ※ 换成换行+注记 */
    function fmtEffect(text) {
        if (!text) return '';
        return text.replace(/※/g, '<br><span class="effect-note">※</span>');
    }

    /* ── 解析技能文本 ── */
    function parseSkill(text, source) {
        const game = getGame(source);
        const nameMatch = text.match(/^【(.+?)】/);
        const name = nameMatch ? nameMatch[1] : text.slice(0, 15);

        if (game === 'feh') {
            const spMatch = text.match(/\(SP:\s*(\d+)\)/);
            const sp = spMatch ? spMatch[1] : '';
            let info = text.replace(/^【.+?】/, '').replace(/\(SP:\s*\d+\)\s*/, '').trim();
            info = info.replace(/\|+\s*$/, '').trim();
            return { game, name, sp, info, levels: {}, effect: '', target: '', tags: '' };
        }

        // PK_Alterna
        const typeMatch = text.match(/種別：(\S+)/);
        const type = typeMatch ? typeMatch[1] : '';

        const levels = {};
        const lvRe = / Lv(\d+)：(.+?)(?= Lv\d+：| タグ：|$)/g;
        let m;
        while ((m = lvRe.exec(text)) !== null) {
            levels[m[1]] = m[2].trim();
        }

        let effect = '';
        if (Object.keys(levels).length === 0) {
            const em = text.match(/ 効果：(.+?)(?= 対象：| タグ：|$)/);
            if (em) effect = em[1].trim();
        }

        const targetM = text.match(/ 対象：(.+?)(?= タグ：|$)/);
        const target = targetM ? targetM[1].trim() : '';

        const tagM = text.match(/ タグ：(.+?)$/);
        const rawTags = tagM ? tagM[1].trim() : '';
        const tags = rawTags ? rawTags.split(/[、,]/).filter(Boolean) : [];

        return { game, name, type, levels, effect, target, tags };
    }

    /* ── 渲染技能卡片 ── */
    function renderSkillCard(item, regex) {
        const p = parseSkill(item.text, item.source);

        const gameBadgeHtml = {
            feh:  '<span class="game-badge feh">FEH</span>',
            pka:  '<span class="game-badge pka">ファンキルオルタナ</span>',
        }[p.game] || '';

        const nameHtml = `<span class="skill-name">【${hl(p.name, regex)}】</span>`;
        const typeBadge = p.type ? `<span class="skill-type-badge">${p.type}</span>` : '';
        const spBadge = p.sp ? `<span class="sp-badge">SP: ${p.sp}</span>` : '';

        let bodyHtml = '';

        if (p.game === 'feh') {
            bodyHtml = `<div class="skill-effect-row">${hl(fmtEffect(p.info), regex)}</div>`;
        } else {
            const lvKeys = Object.keys(p.levels).sort((a, b) => +a - +b);
            if (lvKeys.length > 0) {
                const rows = lvKeys.map(lv =>
                    `<div class="skill-level-row">
                        <span class="skill-lv-label">Lv${lv}</span>
                        <span class="skill-lv-effect">${hl(fmtEffect(p.levels[lv]), regex)}</span>
                    </div>`
                ).join('');
                bodyHtml = `<div class="skill-levels">${rows}</div>`;
            } else if (p.effect) {
                bodyHtml = `<div class="skill-effect-row">${hl(fmtEffect(p.effect), regex)}</div>`;
                if (p.target) {
                    bodyHtml += `<div class="skill-info-row"><span class="skill-info-label">対象</span><span>${hl(p.target, regex)}</span></div>`;
                }
            }

            if (p.tags.length > 0) {
                const chips = p.tags.map(t => `<span class="skill-tag-chip">${hl(t, regex)}</span>`).join('');
                bodyHtml += `<div class="skill-tags">${chips}</div>`;
            }
        }

        return `
            <div class="result-item skill-card">
                <div class="skill-header">
                    ${gameBadgeHtml}${nameHtml}${typeBadge}${spBadge}
                </div>
                ${bodyHtml}
            </div>`;
    }

    /* ── 上下文构建（剧情专用）── */
    function buildContext(baseIdx, dir, src) {
        let lines = [], chars = 0, i = baseIdx + dir;
        while (i >= 0 && i < corpusData.length) {
            const d = corpusData[i];
            if (!d || d.source !== src || !d.text || isSkillItem(d)) break;
            dir === -1 ? lines.unshift(d.text) : lines.push(d.text);
            chars += d.text.length;
            if (chars >= 500) break;
            i += dir;
        }
        return lines.length ? lines.map(l => `<div class="context-line">${l}</div>`).join('') : '';
    }

    /* ── 主搜索逻辑 ── */
    function performSearch() {
        const keyword = document.getElementById('searchInput').value.trim();
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        if (!keyword) { updateStatus(); return; }

        const lower = keyword.toLowerCase();
        const regex = keyword ? new RegExp(`(${escapeRegExp(keyword)})`, 'gi') : null;
        const matched = [];

        for (let i = 0; i < corpusData.length; i++) {
            const d = corpusData[i];
            if (!d || !d.text) continue;
            const skill = isSkillItem(d);
            if (currentMode === 'skill' && !skill) continue;
            if (currentMode === 'dialogue' && skill) continue;
            if (currentMode === 'skill' && currentGame !== 'all' && getGame(d.source) !== currentGame) continue;
            if (d.text.toLowerCase().includes(lower)) {
                matched.push(i);
                if (matched.length >= 100) break;
            }
        }

        if (!matched.length) {
            document.getElementById('status').innerText = '没有找到相关结果 😭';
            return;
        }
        document.getElementById('status').innerText = `为您找到相关结果 ${matched.length} 条 (最多展示100条)：`;

        const frag = document.createDocumentFragment();

        matched.forEach(idx => {
            const item = corpusData[idx];

            if (currentMode === 'skill') {
                const div = document.createElement('div');
                div.innerHTML = renderSkillCard(item, regex);
                frag.appendChild(div.firstElementChild);
                return;
            }

            // 剧情卡片
            const highlightedText = item.text.replace(regex, '<span class="highlight">$1</span>');
            const prevHtml = (() => {
                const t = buildContext(idx, -1, item.source);
                return t ? `<details class="context-details"><summary>▶ 点击展开上文 (约500字)</summary><div class="context-box">${t}</div></details>` : '';
            })();
            const nextHtml = (() => {
                const t = buildContext(idx, 1, item.source);
                return t ? `<details class="context-details"><summary>▶ 点击展开下文 (约500字)</summary><div class="context-box">${t}</div></details>` : '';
            })();
            const metaTag = item.meta ? `<span class="meta-tag">🏷️ ${item.meta}</span>` : '';

            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <div style="margin-bottom:12px;">
                    <span class="source-tag">📂 ${item.source}</span>${metaTag}
                </div>
                ${prevHtml}
                <div class="matched-line">🎯 ${highlightedText}</div>
                ${nextHtml}`;
            frag.appendChild(div);
        });

        resultsDiv.appendChild(frag);
    }

    document.getElementById('searchInput').addEventListener('input', performSearch);
    </script>
</body>
</html>
